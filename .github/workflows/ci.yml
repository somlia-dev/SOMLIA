name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  landing-test-and-build:
    name: Landing test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run landing tests
        run: npm run test:landing

      - name: Build landing
        run: npm run build:landing

  dashboard-test-and-build:
    name: Dashboard test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run dashboard tests
        run: npm run test:dashboard

      - name: Build dashboard
        run: npm run build:dashboard
